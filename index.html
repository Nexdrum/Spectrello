<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPECTRELLO</title>
  <style>
    :root{
      --bg:#06080d;
      --panel:#0b0f17;
      --card:rgba(255,255,255,.05);
      --border:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.96);
      --muted:rgba(255,255,255,.60);
      --soft:rgba(255,255,255,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    .app{
      max-width:1600px;
      margin:0 auto;
      padding:24px 16px 40px;
    }
    .top{
      display:flex;
      flex-wrap:wrap;
      gap:16px;
      align-items:flex-end;
      justify-content:space-between;
      margin-bottom:24px;
    }
    h1{
      margin:0;
      font-size:32px;
      line-height:1.1;
      font-weight:700;
      letter-spacing:-0.02em;
    }

    .logo{
      margin:0;
      font-size:32px;
      line-height:1.1;
      font-weight:800;
      letter-spacing:0.08em;
      background: linear-gradient(
        90deg,
        rgb(58,255,0),
        rgb(0,255,236),
        rgb(0,143,255),
        rgb(15,0,251),
        rgb(99,0,190),
        rgb(110,0,128),
        rgb(152,0,0),
        rgb(200,0,0),
        rgb(243,0,0),
        rgb(255,120,0),
        rgb(255,239,0),
        rgb(170,255,0)
      );
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      color:transparent;
      text-shadow:
        0 0 6px rgba(255,255,255,0.15),
        0 0 12px rgba(255,255,255,0.10),
        0 0 20px rgba(0,255,255,0.08);
    }
    .sub{
      margin-top:6px;
      color:var(--muted);
      font-size:14px;
    }
    .controls{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
      gap:14px;
      width:min(100%, 1220px);
    }
    .control-group{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:14px 16px;
      border:1px solid var(--border);
      border-radius:24px;
      background:var(--card);
      min-width:0;
    }
    .control-group-title{
      font-size:13px;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:rgba(255,255,255,.72);
    }
    .control-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:10px 14px;
      align-items:end;
    }
    .controls label, .control-item{
      display:flex;
      align-items:center;
      gap:8px;
      color:rgba(255,255,255,.78);
      font-size:14px;
      min-width:0;
    }
    .controls label{justify-content:space-between;}
    .control-item.compact{justify-content:flex-start;}
    .control-buttons{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .control-buttons button{
      flex:1 1 140px;
    }
    .controls input[type="range"]{accent-color:#fff; flex:1 1 auto; min-width:110px;}
    .controls select{
      flex:1 1 auto;
      min-width:120px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.05);
      color:rgba(255,255,255,.9);
      padding:10px 12px;
      border-radius:14px;
    }
    .controls .value{
      color:rgba(255,255,255,.58);
      white-space:nowrap;
      font-size:13px;
    }
    .controls select{
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.04);
      color:rgba(255,255,255,.92);
      padding:8px 10px;
      border-radius:12px;
    }
    button{
      border:1px solid rgba(255,255,255,.15);
      background:transparent;
      color:rgba(255,255,255,.88);
      padding:10px 14px;
      border-radius:16px;
      cursor:pointer;
    }
    button:hover{background:rgba(255,255,255,.08)}
    .atoms-row{
      display:flex;
      align-items:stretch;
      gap:6px;
      margin-bottom:12px;
      width:max-content;
      min-width:100%;
    }
    .string-add-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:34px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
      color:rgba(255,255,255,.9);
      border-radius:12px;
      font-size:22px;
      line-height:1;
      padding:0 4px;
      cursor:pointer;
    }
    .string-stack{
      display:flex;
      flex-direction:column;
      gap:4px;
      align-items:stretch;
      justify-content:center;
      width:34px;
      flex:0 0 34px;
    }
    .string-add-btn.half{
      min-width:34px;
      width:34px;
      height:32px;
      min-height:32px;
      padding:0;
      border-radius:10px;
      font-size:22px;
    }
    .string-add-btn:disabled{
      opacity:.35;
      cursor:default;
    }
    .atoms{
      display:grid;
      gap:6px;
      grid-auto-flow:column;
      grid-auto-columns:minmax(132px, 1fr);
      margin-bottom:12px;
      align-items:start;
    }
    .atom{
      aspect-ratio:1/1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      text-align:center;
      border:1px solid var(--border);
      background:var(--card);
      border-radius:18px;
      padding:8px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    .atom-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:4px;
    }
    .atom-title{font-size:12px;font-weight:700}
    .atom-sub{font-size:10px;color:var(--muted);margin-top:1px}
    .tuning-top{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:4px;
      margin-bottom:6px;
    }
    .tuning-row{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:4px;
      width:100%;
    }
    .tune-btn{
      padding:4px 7px;
      border-radius:10px;
      font-size:11px;
      line-height:1;
      min-width:52px;
      text-align:center;
    }
    .swatch{
      width:10px;height:10px;border-radius:999px;
    }
    .atom svg{display:block;margin:0 auto;width:118px;height:118px}
    .atom-buttons{
      margin-top:8px;
      display:flex;
      justify-content:space-between;
      gap:8px;
      font-size:12px;
    }
    .atom-buttons > div{
      display:flex;gap:6px;
    }
    .board-wrap{
      display:inline-block;
      border:1px solid var(--border);
      background:var(--panel);
      border-radius:32px;
      padding:16px;
      box-shadow:0 16px 40px rgba(0,0,0,.28);
      touch-action:none;
    }
    .board-meta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
      color:var(--muted);
      font-size:12px;
    }
    .grid{
      width:max-content;
      display:grid;
      grid-template-columns:70px repeat(25,minmax(42px,1fr));
      gap:0px 0px;
      align-items:center;
    }
    .head{
      text-align:center;
      font-size:12px;
      color:rgba(255,255,255,.45);
    }
    .string-label{
      text-align:center;
      font-size:15px;
      font-weight:700;
      color:rgba(255,255,255,.78);
    }
    
    .note-label{
      position:absolute;
      right:6px;
      bottom:4px;
      font-size:12px;
      color:rgba(255,255,255,.85);
      pointer-events:none;
      opacity:0;
      transition:opacity .08s linear;
      font-weight:500;
    }
    .zone.playing .note-label{
      opacity:1;
    }

    .zone{
      position:relative;
      height:64px;
      border-radius:0;
      border:1px solid rgba(255,255,255,.05);
      background:rgba(255,255,255,.02);
      cursor:pointer;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }
    
    
    .zone.top-row{
      border-top:1px solid rgba(255,255,255,.05);
    }
    .zone.bottom-row{
      border-bottom:1px solid rgba(255,255,255,.05);
    }
    .zone.first-zone.top-row{
      border-top-left-radius:18px;
    }
    .zone.last-zone.top-row{
      border-top-right-radius:18px;
    }
    .zone.first-zone.bottom-row{
      border-bottom-left-radius:18px;
    }
    .zone.last-zone.bottom-row{
      border-bottom-right-radius:18px;
    }
    .zone.first-zone{
      border-top-left-radius:0;
      border-bottom-left-radius:0;
    }
    .zone.last-zone{
      border-top-right-radius:0;
      border-bottom-right-radius:0;
    }

    .zone.first-zone{
      border-top-left-radius:18px;
      border-bottom-left-radius:18px;
    }
    .zone.last-zone{
      border-top-right-radius:18px;
      border-bottom-right-radius:18px;
    }

    }

    .string-line{
      position:absolute;
      left:5%;
      top:50%;
      width:90%;
      height:2px;
      transform:translateY(-50%);
      border-radius:999px;
      background:rgba(255,255,255,.20);
      overflow:visible;
    }
    .string-line::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:36%;
      height:100%;
      transform:translate(-50%,-50%);
      border-radius:999px;
      background:var(--note-color, rgba(255,255,255,.12));
      opacity:1;
      box-shadow:0 0 6px var(--note-color);
    }
    .anchor, .active-dot{
      position:absolute;
      left:50%;
      top:50%;
      width:20px;
      height:20px;
      transform:translate(-50%,-50%);
      border-radius:999px;
    }
    
    .active-dot{
      border:1px solid rgba(255,255,255,.30);
    }
    .zone.playing{
      box-shadow:0 0 0 2px rgba(255,255,255,.18) inset, 0 0 18px rgba(255,255,255,.18);
    }
    .zone.playing .active-dot{
      transform:translate(-50%,-50%) scale(1.35);

    .dev-label{

      transition:color .15s ease;

    }
    .zone:hover .dev-label{color:rgba(255,255,255,.35)}
     .board-actions{
      margin-top:14px;
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .loop-status{
      color:var(--muted);
      font-size:13px;
      min-width:120px;
      text-align:center;
    }
    .loop-btn.recording{
      background:rgba(255,80,80,.16);
      border-color:rgba(255,110,110,.4);
      color:#fff;
    }
    .loop-btn.playing{
      background:rgba(120,200,255,.14);
      border-color:rgba(120,200,255,.35);
      color:#fff;
    }
    .event-loop-panel{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      align-items:flex-end;
      gap:12px;
      padding:12px 14px;

    }
    .event-loop-group{
      display:flex;
      align-items:center;
      gap:8px;

    }
    .event-stepper{
      display:flex;
      align-items:center;
      gap:8px;
      color:rgba(255,255,255,.78);
    }
    .event-stepper .bpm-readout{
      min-width:56px;
      text-align:center;
    }
    .event-loop-title{
      font-size:13px;

      letter-spacing:.04em;
      text-transform:uppercase;
      color:rgba(255,255,255,.72);
      margin-right:2px;
    }
    .event-loop-panel input[type="number"]{
      width:72px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.05);
      color:rgba(255,255,255,.92);
      padding:8px 10px;
      border-radius:12px;
    }
    .bpm-readout{
      min-width:74px;

      font-weight:700;
      color:rgba(255,255,255,.92);
    }
    .event-loop-status{
      color:var(--muted);
      font-size:13px;

    .note{
      margin-top:20px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      border-radius:24px;

<body>
  <div class="app">
    <div class="top">
      <div>
        <h1 class="logo">SPECTRELLO</h1>
      </div>
      <div class="controls">
        <section class="control-group">
          <div class="control-group-title">UI control section</div>
          <div class="control-grid">
            <label>
              <span>Preset</span>
              <select id="presetSelect">
                <option value="custom">Custom</option>
                <option value="cello">Cello</option>
                <option value="guitar">Guitar</option>
                <option value="spectrello">Spectrello</option>
              </select>
            </label>
            <label class="control-item compact"><input id="matchScale" type="checkbox" /> <span>Match scale</span></label>
          </div>
          <div class="control-buttons">
            <button id="resetBtn">Reset Atoms</button>
            <button id="audioBtn">Audio: On</button>
            <button id="panicBtn">Stop Notes</button>
          </div>
        </section>

        <section class="control-group">
          <div class="control-group-title">Waveform behavior settings</div>
          <div class="control-grid">
            <label>
              <span>Volume</span>
              <input id="volume" type="range" min="0.05" max="1" step="0.01" value="0.8" />
            </label>
            <label>
              <span>Decay</span>
              <input id="decay" type="range" min="1" max="5000" value="700" />
              <span class="value" id="decayValue">700 ms</span>
            </label>
            <label class="control-item compact"><input id="pluckMode" type="checkbox" /> <span>Pluck mode</span></label>
            <label class="control-item compact"><input id="palmMuteMode" type="checkbox" /> <span>Palm mute mode</span></label>
            <label class="control-item compact"><input id="yExpression" type="checkbox" checked /> <span>Y-axis expression</span></label>
            <label>
              <span>Expression depth</span>
              <input id="expressionDepth" type="range" min="0.2" max="1.0" step="0.05" value="0.85" />
              <span class="value" id="expressionDepthValue">0.85</span>
            </label>
            <label class="control-item compact"><input id="xPitchExpression" type="checkbox" checked /> <span>X-axis pitch bend</span></label>
            <label>
              <span>Bend range</span>
              <input id="bendRange" type="range" min="10" max="50" step="1" value="50" />
              <span class="value" id="bendRangeValue">±50¢</span>
            </label>
          </div>
        </section>

        <section class="control-group">
          <div class="control-group-title">FX</div>
          <div class="control-grid">
            <label class="control-item compact"><input id="reverbEnabled" type="checkbox" /> <span>Reverb</span></label>
            <label>
              <span>Reverb amount</span>
              <input id="reverbAmount" type="range" min="0" max="1" step="0.01" value="0.25" />
              <span class="value" id="reverbAmountValue">0.25</span>
            </label>
            <label>
              <span>Reverb decay</span>
              <input id="reverbDecay" type="range" min="0.3" max="8" step="0.1" value="2.5" />
              <span class="value" id="reverbDecayValue">2.5 s</span>
            </label>
            <label class="control-item compact"><input id="delayEnabled" type="checkbox" /> <span>Delay</span></label>
            <label>
              <span>Delay amount</span>
              <input id="delayAmount" type="range" min="0" max="1" step="0.01" value="0.25" />
              <span class="value" id="delayAmountValue">0.25</span>
            </label>
            <label>
              <span>Delay decay</span>
              <input id="delayDecay" type="range" min="0" max="0.95" step="0.01" value="0.35" />
              <span class="value" id="delayDecayValue">0.35</span>
            </label>
            <label>
              <span>Delay speed</span>
              <input id="delaySpeed" type="range" min="0.05" max="1.5" step="0.01" value="0.32" />
              <span class="value" id="delaySpeedValue">0.32 s</span>
            </label>
            <label class="control-item compact"><input id="distortionEnabled" type="checkbox" /> <span>Distortion</span></label>
            <label>
              <span>Dist gain</span>
              <input id="distortionAmount" type="range" min="0" max="100" step="1" value="25" />
              <span class="value" id="distortionAmountValue">25</span>
            </label>
            <label>
              <span>Dist in</span>
              <input id="distortionInput" type="range" min="0" max="3" step="0.01" value="1.00" />
              <span class="value" id="distortionInputValue">1.00</span>
            </label>
            <label>
              <span>Dist out</span>
              <input id="distortionOutput" type="range" min="0" max="3" step="0.01" value="0.85" />
              <span class="value" id="distortionOutputValue">0.85</span>
            </label>
          </div>
        </section>
      </div>
    </div>

  function clamp(value, min, max){

  const DEFAULT_Y_PROFILE = Object.freeze({
    level: 1,
    normalizedDistance: 0,
    filterLevel: 1,
    muteMix: 0,
    zoneType: "normal"
  });
  const TEMP_Y_PROFILE = { ...DEFAULT_Y_PROFILE };
  const TEMP_BODY_PROFILE = { muteMix: 0, bodyCenter: 0, bodyQ: 0, bodyGain: 0, smoothCutoff: 0 };
  const TEMP_X_EXPRESSION = { cents: 0, normalizedX: 0.5 };

  function setTempYProfile(level, normalizedDistance, filterLevel, muteMix, zoneType){
    TEMP_Y_PROFILE.level = level;
    TEMP_Y_PROFILE.normalizedDistance = normalizedDistance;
    TEMP_Y_PROFILE.filterLevel = filterLevel;
    TEMP_Y_PROFILE.muteMix = muteMix;
    TEMP_Y_PROFILE.zoneType = zoneType;
    return TEMP_Y_PROFILE;
  }

  function copyProfile(profile){
    const source = profile || DEFAULT_Y_PROFILE;
    return {
      level: source.level ?? 1,
      normalizedDistance: source.normalizedDistance ?? 0,
      filterLevel: source.filterLevel ?? (source.level ?? 1),
      muteMix: source.muteMix ?? 0,
      zoneType: source.zoneType ?? "normal"
    };
  }

  function profilesEquivalent(a, b){
    return !!a && !!b
      && a.level === b.level
      && a.normalizedDistance === b.normalizedDistance
      && a.filterLevel === b.filterLevel
      && a.muteMix === b.muteMix
      && a.zoneType === b.zoneType;
  }

  function centsToRatio(cents){
    return Math.pow(2, cents / 1200);
  }

  function extendHarmonics(base, total, falloff){
    const values = base.slice();
    while(values.length < total){
      const prev = values[values.length - 1] || 0.01;
      values.push(prev * falloff);
    }
    return values;
  }

  function createPeriodicWaveFromAmplitudes(ctx, amplitudes){
    const harmonics = amplitudes.length;
    const real = new Float32Array(harmonics + 1);
    const imag = new Float32Array(harmonics + 1);
    for(let i = 1; i <= harmonics; i += 1){
      imag[i] = amplitudes[i - 1];
    }
    return ctx.createPeriodicWave(real, imag, { disableNormalization: false });
  }

  function getStringWaveForMuteMix(ctx, muteMix = 0){
    ensureStringVoiceAssets(ctx);
    const quantized = Math.round(clamp(muteMix, 0, 1) * 16) / 16;
    const key = quantized.toFixed(4);
    if(stringWaveCache.has(key)) return stringWaveCache.get(key);
    const amps = openStringAmps.map((openAmp, index) => {
      const palmAmp = palmStringAmps[index] ?? 0;
      return (openAmp * (1 - quantized)) + (palmAmp * quantized);
    });
    const wave = createPeriodicWaveFromAmplitudes(ctx, amps);
    stringWaveCache.set(key, wave);
    return wave;
  }

  function ensureStringVoiceAssets(ctx){
    if(!stringWaveOpen){
      openStringAmps = extendHarmonics([1.00, 0.70, 0.50, 0.38, 0.28, 0.20], 18, 0.78);
      const pluckAmps = extendHarmonics([1.00, 0.75, 0.55, 0.42, 0.34, 0.27, 0.22], 18, 0.82);
      palmStringAmps = extendHarmonics([1.55, 1.18, 0.78, 0.40, 0.18, 0.08], 18, 0.46);
      stringWaveOpen = createPeriodicWaveFromAmplitudes(ctx, openStringAmps);
      stringWavePluck = createPeriodicWaveFromAmplitudes(ctx, pluckAmps);
      stringWavePalm = createPeriodicWaveFromAmplitudes(ctx, palmStringAmps);
      stringWaveCache = new Map();
      stringWaveCache.set((0).toFixed(4), stringWaveOpen);
      stringWaveCache.set((1).toFixed(4), stringWavePalm);
    }
    if(!pluckNoiseBuffer){
      const length = Math.max(1, Math.floor(ctx.sampleRate * 0.18));
      pluckNoiseBuffer = ctx.createBuffer(1, length, ctx.sampleRate);
      const data = pluckNoiseBuffer.getChannelData(0);
      for(let i = 0; i < length; i += 1){
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (length * 0.22));
      }
    }
    if(!bowNoiseBuffer){
      const length = Math.max(1, Math.floor(ctx.sampleRate * 0.5));
      bowNoiseBuffer = ctx.createBuffer(1, length, ctx.sampleRate);
      const data = bowNoiseBuffer.getChannelData(0);
      let last = 0;
      for(let i = 0; i < length; i += 1){
        const white = (Math.random() * 2 - 1);
        last = (last * 0.82) + (white * 0.18);
        data[i] = last * 0.75;
      }
    }
  }


  function createImpulseResponse(ctx, seconds = 2.5){
    const duration = Math.max(0.1, seconds);
    const length = Math.max(1, Math.floor(ctx.sampleRate * duration));
    const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
    for(let channel = 0; channel < impulse.numberOfChannels; channel += 1){
      const data = impulse.getChannelData(channel);
      for(let i = 0; i < length; i += 1){
        const t = i / length;
        const decayCurve = Math.pow(1 - t, duration * 1.35);
        data[i] = (Math.random() * 2 - 1) * decayCurve;
      }
    }
    return impulse;
  }

  const distortionCurveCache = new Map();
  function makeDistortionCurve(amount){
    const quantizedAmount = Math.round(Math.max(0, amount) * 100) / 100;
    const cacheKey = quantizedAmount.toFixed(2);
    if(distortionCurveCache.has(cacheKey)) return distortionCurveCache.get(cacheKey);
    const samples = 22050;
    const curve = new Float32Array(samples);
    const k = quantizedAmount <= 0 ? 0 : quantizedAmount * 2.2;
    for(let i = 0; i < samples; i++){
      const x = (i * 2 / (samples - 1)) - 1;
      curve[i] = k === 0 ? x : ((1 + k) * x) / (1 + k * Math.abs(x));
    }
    distortionCurveCache.set(cacheKey, curve);
    return curve;
  }

  function updateReverbBuffer(){

    dryGain.gain.value = 1;
    reverbWetGain.gain.value = reverbEnabled ? reverbAmount : 0;
    delayWetGain.gain.value = delayEnabled ? delayAmount : 0;
    delayFeedback.gain.value = delayEnabled ? delayDecay : 0;
    delayNode.delayTime.value = delaySpeed;

    distortionDryGain.gain.value = distortionEnabled ? 0 : 1;
    distortionPreGain.gain.value = distortionEnabled ? distortionInputLevel : 0;
    distortionWetGainNode.gain.value = distortionEnabled ? distortionOutputLevel : 0;
    if(distortionEnabled){
      if(lastDistortionCurveAmount !== distortionAmount){
        distortionShaper.curve = makeDistortionCurve(distortionAmount);
        lastDistortionCurveAmount = distortionAmount;
      }
      distortionShaper.oversample = '4x';
    } else if(lastDistortionCurveAmount !== null){
      distortionShaper.curve = null;
      lastDistortionCurveAmount = null;
    }

    outputGain.gain.value = masterVolume;
    if(loopPlaybackGain) loopPlaybackGain.gain.value = masterVolume;
    updateEventLoopEffects();

  function getXExpressionFromEvent(e, zoneEl){
    if(!xPitchExpressionEnabled || !zoneEl){
      TEMP_X_EXPRESSION.cents = 0;
      TEMP_X_EXPRESSION.normalizedX = 0.5;
      return TEMP_X_EXPRESSION;
    }
    const rect = zoneEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const normalizedX = clamp(x / rect.width, 0, 1);
    const centered = (normalizedX - 0.5) * 2;
    TEMP_X_EXPRESSION.cents = centered * bendRangeCents;
    TEMP_X_EXPRESSION.normalizedX = normalizedX;
    return TEMP_X_EXPRESSION;
  }

  function getDefaultYProfile(){

  function getYExpressionFromEvent(e, zoneEl){
    if(!zoneEl || !yExpressionEnabled){
      return DEFAULT_Y_PROFILE;
    }

    const rect = zoneEl.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const normalizedY = clamp(y / rect.height, 0, 1);
    const distanceFromCenter = Math.abs(normalizedY - 0.5) / 0.5;

    if(palmMuteModeEnabled){
      const muteMix = clamp(distanceFromCenter * expressionDepth, 0, 1);
      return setTempYProfile(1, distanceFromCenter, 1, muteMix, "palm-gradient");
    }

    if(!pluckModeEnabled){
      const pressure = clamp(1 - (distanceFromCenter * (1.18 * expressionDepth)), 0, 1);
      const bowedLevel = Math.pow(pressure, 2.35);
      const level = 0.06 + (bowedLevel * 0.94);
      return setTempYProfile(level, distanceFromCenter, pressure, 0, "bow");
    }

    const minLevel = expressionDepth >= 1 ? 0 : 0.08;
    const level = clamp(1 - (distanceFromCenter * expressionDepth), minLevel, 1);
    return setTempYProfile(level, distanceFromCenter, level, 0, "normal");
  }

  function gainFromLevel(level){
    return 0.03 + (0.21 * level);

  function bodyToneFromProfile(profile, baseFrequency = 220, settings = null){
    const yProfile = clampProfile(profile);
    const muteMix = clamp(yProfile.muteMix ?? 0, 0, 1);
    const pressure = clamp(yProfile.filterLevel ?? yProfile.level ?? 1, 0, 1);
    TEMP_BODY_PROFILE.muteMix = muteMix;
    const voiceSettings = getResolvedVoiceSettings(settings);
    if(!voiceSettings.pluckModeEnabled && !muteMix){
      TEMP_BODY_PROFILE.bodyCenter = Math.min(3200, Math.max(160, baseFrequency * (3.0 + (1.5 * pressure))));
      TEMP_BODY_PROFILE.bodyQ = 0.8 + (1.8 * pressure);
      TEMP_BODY_PROFILE.bodyGain = 4.0 + (4.8 * pressure);
      TEMP_BODY_PROFILE.smoothCutoff = 1500 + (4200 * pressure);
      return TEMP_BODY_PROFILE;
    }
    TEMP_BODY_PROFILE.bodyCenter = Math.min(2200, Math.max(120, baseFrequency * (4.0 - (2.3 * muteMix))));
    TEMP_BODY_PROFILE.bodyQ = 1.0 + (5.4 * muteMix);
    TEMP_BODY_PROFILE.bodyGain = 5.8 + (7.8 * muteMix);
    TEMP_BODY_PROFILE.smoothCutoff = (5200 * (1 - muteMix)) + (1350 * muteMix);
    return TEMP_BODY_PROFILE;
  }

  function gainMultiplierFromProfile(profile, settings = null){
    const yProfile = clampProfile(profile);
    const muteMix = yProfile.muteMix ?? 0;
    const voiceSettings = getResolvedVoiceSettings(settings);
    if(!voiceSettings.pluckModeEnabled && !muteMix){
      const pressure = clamp(yProfile.filterLevel ?? yProfile.level ?? 1, 0, 1);
      return 0.95 + (0.12 * pressure);
    }
    return 1 + (0.26 * muteMix);
  }

  function applyBodyProfile(voice, profile, immediate = false){
    if(!voice || !audioContext) return;
    const yProfile = clampProfile(profile);
    const now = audioContext.currentTime;
    const glide = immediate ? 0.001 : 0.02;
    const body = bodyToneFromProfile(yProfile, voice.baseFrequency || 220, voice.settings);
    const muteMix = clamp(yProfile.muteMix ?? 0, 0, 1);

    if(voice.lastMuteMix !== muteMix && voice.osc && typeof voice.osc.setPeriodicWave === "function"){
      voice.osc.setPeriodicWave(getStringWaveForMuteMix(audioContext, muteMix));
      voice.lastMuteMix = muteMix;
    }

    if(
      immediate ||
      voice.lastBodyCenter !== body.bodyCenter ||
      voice.lastBodyQ !== body.bodyQ ||
      voice.lastBodyGain !== body.bodyGain ||
      voice.lastSmoothCutoff !== body.smoothCutoff
    ){
      voice.bodyFilter.frequency.cancelScheduledValues(now);
      voice.bodyFilter.Q.cancelScheduledValues(now);
      voice.bodyFilter.gain.cancelScheduledValues(now);
      voice.smoothFilter.frequency.cancelScheduledValues(now);

      voice.bodyFilter.frequency.linearRampToValueAtTime(body.bodyCenter, now + glide);
      voice.bodyFilter.Q.linearRampToValueAtTime(body.bodyQ, now + glide);
      voice.bodyFilter.gain.linearRampToValueAtTime(body.bodyGain, now + glide);
      voice.smoothFilter.frequency.linearRampToValueAtTime(body.smoothCutoff, now + glide);

      voice.lastBodyCenter = body.bodyCenter;
      voice.lastBodyQ = body.bodyQ;
      voice.lastBodyGain = body.bodyGain;
      voice.lastSmoothCutoff = body.smoothCutoff;
    }

    if(!profilesEquivalent(voice.yProfile, yProfile)){
      voice.yProfile = copyProfile(yProfile);
    }
  }

  function updateBowNoiseProfile(voice, profile, immediate = false){
    if(!voice || !voice.bowNoiseGain || !voice.bowNoiseFilter || !audioContext) return;
    const yProfile = clampProfile(profile || voice.yProfile);
    const pressure = clamp(yProfile.filterLevel ?? yProfile.level ?? 1, 0, 1);
    const now = audioContext.currentTime;
    const glide = immediate ? 0.003 : 0.03;
    const targetNoiseGain = 0.004 + ((1 - pressure) * 0.012) + (pressure * 0.0065);
    const targetNoiseCutoff = 700 + (pressure * 2100);
    const targetNoiseQ = 0.5 + (pressure * 1.3);

    voice.bowNoiseGain.gain.cancelScheduledValues(now);
    voice.bowNoiseGain.gain.linearRampToValueAtTime(targetNoiseGain, now + glide);
    voice.bowNoiseFilter.frequency.cancelScheduledValues(now);
    voice.bowNoiseFilter.frequency.linearRampToValueAtTime(targetNoiseCutoff, now + glide);
    voice.bowNoiseFilter.Q.cancelScheduledValues(now);
    voice.bowNoiseFilter.Q.linearRampToValueAtTime(targetNoiseQ, now + glide);
  }

  function startBowSustain(voice, profile){
    if(!voice || !audioContext || !bowNoiseBuffer) return;
    const yProfile = clampProfile(profile || voice.yProfile);
    const pressure = clamp(yProfile.filterLevel ?? yProfile.level ?? 1, 0, 1);
    const now = audioContext.currentTime;

    const bowNoiseSource = audioContext.createBufferSource();
    const bowNoiseFilter = audioContext.createBiquadFilter();
    const bowNoiseGain = audioContext.createGain();
    const bowAccentGain = audioContext.createGain();

    bowNoiseSource.buffer = bowNoiseBuffer;
    bowNoiseSource.loop = true;
    bowNoiseFilter.type = "bandpass";
    bowNoiseFilter.frequency.value = 700 + (pressure * 2100);
    bowNoiseFilter.Q.value = 0.5 + (pressure * 1.3);
    bowNoiseGain.gain.value = 0.0001;
    bowAccentGain.gain.value = 0.0001;

    bowNoiseSource.connect(bowNoiseFilter);
    bowNoiseFilter.connect(bowNoiseGain);
    bowNoiseGain.connect(voice.voiceGain);
    bowNoiseFilter.connect(bowAccentGain);
    bowAccentGain.connect(voice.voiceGain);

    bowNoiseSource.start(now);

    const onsetGain = Math.max(0.0001, gainFromLevel(yProfile.level) * gainMultiplierFromProfile(yProfile, voice.settings));
    voice.voiceGain.gain.cancelScheduledValues(now);
    voice.voiceGain.gain.setValueAtTime(0.0001, now);
    voice.voiceGain.gain.linearRampToValueAtTime(onsetGain * (0.68 + (pressure * 0.10)), now + 0.024);
    voice.voiceGain.gain.linearRampToValueAtTime(onsetGain, now + 0.085);

    bowAccentGain.gain.setValueAtTime(0.010 + (pressure * 0.009), now);
    bowAccentGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.07);

    voice.bowNoiseSource = bowNoiseSource;
    voice.bowNoiseFilter = bowNoiseFilter;
    voice.bowNoiseGain = bowNoiseGain;
    voice.bowAccentGain = bowAccentGain;
    updateBowNoiseProfile(voice, yProfile, true);
  }

  function schedulePluckTransient(voice, profile){
    if(!voice || !audioContext) return;
    const yProfile = clampProfile(profile);
    const now = audioContext.currentTime;
    const muteMix = clamp(yProfile.muteMix ?? 0, 0, 1);
    const transientOsc = audioContext.createOscillator();
    const transientGain = audioContext.createGain();
    const transientFilter = audioContext.createBiquadFilter();
    const noise = audioContext.createBufferSource();
    const noiseFilter = audioContext.createBiquadFilter();
    const noiseGain = audioContext.createGain();

    transientOsc.setPeriodicWave(stringWavePluck || stringWaveOpen);
    transientOsc.frequency.value = (voice.baseFrequency || 220) * (1.95 - (0.95 * muteMix));
    transientFilter.type = "bandpass";
    transientFilter.frequency.value = (1800 * (1 - muteMix)) + (520 * muteMix);
    transientFilter.Q.value = 0.9 + (2.5 * muteMix);

    const transientLevel = gainFromLevel(yProfile.level) * (0.40 + (0.30 * muteMix));
    transientGain.gain.setValueAtTime(Math.max(0.0001, transientLevel), now);
    transientGain.gain.exponentialRampToValueAtTime(0.0001, now + (0.05 - (0.01 * muteMix)));

    transientOsc.connect(transientFilter);
    transientFilter.connect(transientGain);
    transientGain.connect(voice.voiceGain);
    transientOsc.start(now);
    transientOsc.stop(now + 0.085);

    noise.buffer = pluckNoiseBuffer;
    noiseFilter.type = "bandpass";
    noiseFilter.frequency.value = (3000 * (1 - muteMix)) + (1200 * muteMix);
    noiseFilter.Q.value = 0.7 + (1.3 * muteMix);
    noiseGain.gain.setValueAtTime(Math.max(0.0001, 0.035 + (0.02 * muteMix)), now);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + (0.028 + (0.008 * muteMix)));
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(voice.voiceGain);
    noise.start(now);

    voice.transientOsc = transientOsc;
    voice.noiseSource = noise;
  }

  function schedulePluckDecay(voice, profile){
    if(!voice || !audioContext) return;
    const yProfile = clampProfile(profile || voice.yProfile);
    const now = audioContext.currentTime;
    const startGain = gainFromLevel(yProfile.level) * gainMultiplierFromProfile(yProfile, voice.settings);
    const muteMix = clamp(yProfile.muteMix ?? 0, 0, 1);
    const endGain = 0.0001;
    const decayScale = (voice.settings?.palmMuteModeEnabled ?? palmMuteModeEnabled)
      ? Math.max(0.08, 1 - (0.92 * muteMix))
      : (1 - (0.32 * muteMix));
    voice.voiceGain.gain.cancelScheduledValues(now);
    voice.voiceGain.gain.setValueAtTime(Math.max(0.0001, startGain), now);
    voice.voiceGain.gain.exponentialRampToValueAtTime(endGain, now + Math.max(0.003, ((voice.settings?.releaseMs ?? releaseMs) / 1000) * decayScale));
    voice.pluckLevel = yProfile.level;
    voice.yProfile = copyProfile(yProfile);
    applyBodyProfile(voice, yProfile, true);
  }

  function applyExpressionToVoice(voice, profile, cents = null){
    if(!voice || !audioContext) return;
    const yProfile = clampProfile(profile || voice.yProfile);
    const now = audioContext.currentTime;
    const targetGain = gainFromLevel(yProfile.level) * gainMultiplierFromProfile(yProfile, voice.settings);

    if(!(voice.settings?.pluckModeEnabled ?? pluckModeEnabled)){
      if(voice.lastTargetGain !== targetGain){
        voice.voiceGain.gain.cancelScheduledValues(now);
        voice.voiceGain.gain.linearRampToValueAtTime(targetGain, now + 0.028);
        voice.lastTargetGain = targetGain;
      }
      applyBodyProfile(voice, yProfile, false);
      updateBowNoiseProfile(voice, yProfile, false);
      voice.expressionLevel = yProfile.level;
    }

    if(cents !== null && typeof voice.baseFrequency === "number" && voice.bendCents !== cents){
      const targetFrequency = voice.baseFrequency * centsToRatio(cents);
      if(voice.osc){
        voice.osc.frequency.cancelScheduledValues(now);
        voice.osc.frequency.linearRampToValueAtTime(targetFrequency, now + ((voice.settings?.pluckModeEnabled ?? pluckModeEnabled) ? 0.012 : 0.022));
      }
      voice.bendCents = cents;
    }
  }

  async function ensureAudio(){
    if(!audioContext){
      audioContext = new (window.AudioContext || window.webkitAudioContext)();

      inputGain = audioContext.createGain();
      dryGain = audioContext.createGain();
      reverbWetGain = audioContext.createGain();
      delayWetGain = audioContext.createGain();
      outputGain = audioContext.createGain();
      convolver = audioContext.createConvolver();
      delayNode = audioContext.createDelay(2.0);
      delayFeedback = audioContext.createGain();
      distortionDryGain = audioContext.createGain();
      distortionPreGain = audioContext.createGain();
      distortionShaper = audioContext.createWaveShaper();
      distortionWetGainNode = audioContext.createGain();
      postEffectsSourceGain = audioContext.createGain();
      eventLoopInputGain = audioContext.createGain();
      eventLoopDryGain = audioContext.createGain();
      eventLoopReverbWetGain = audioContext.createGain();
      eventLoopDelayWetGain = audioContext.createGain();
      eventLoopOutputGain = audioContext.createGain();
      eventLoopConvolver = audioContext.createConvolver();
      eventLoopDelayNode = audioContext.createDelay(2.0);
      eventLoopDelayFeedback = audioContext.createGain();
      eventLoopDistortionDryGain = audioContext.createGain();
      eventLoopDistortionPreGain = audioContext.createGain();
      eventLoopDistortionShaper = audioContext.createWaveShaper();
      eventLoopDistortionWetGainNode = audioContext.createGain();
      eventLoopPostEffectsSourceGain = audioContext.createGain();
      loopPlaybackGain = audioContext.createGain();
      loopMediaDestination = audioContext.createMediaStreamDestination();

      inputGain.connect(distortionDryGain);
      distortionDryGain.connect(postEffectsSourceGain);

      inputGain.connect(distortionPreGain);
      distortionPreGain.connect(distortionShaper);
      distortionShaper.connect(distortionWetGainNode);
      distortionWetGainNode.connect(postEffectsSourceGain);

      postEffectsSourceGain.connect(dryGain);
      dryGain.connect(outputGain);

      postEffectsSourceGain.connect(convolver);
      convolver.connect(reverbWetGain);
      reverbWetGain.connect(outputGain);

      postEffectsSourceGain.connect(delayNode);
      delayNode.connect(delayWetGain);
      delayWetGain.connect(outputGain);
      delayNode.connect(delayFeedback);
      delayFeedback.connect(delayNode);

      eventLoopInputGain.connect(eventLoopDistortionDryGain);
      eventLoopDistortionDryGain.connect(eventLoopPostEffectsSourceGain);

      eventLoopInputGain.connect(eventLoopDistortionPreGain);
      eventLoopDistortionPreGain.connect(eventLoopDistortionShaper);
      eventLoopDistortionShaper.connect(eventLoopDistortionWetGainNode);
      eventLoopDistortionWetGainNode.connect(eventLoopPostEffectsSourceGain);

      eventLoopPostEffectsSourceGain.connect(eventLoopDryGain);
      eventLoopDryGain.connect(eventLoopOutputGain);

      eventLoopPostEffectsSourceGain.connect(eventLoopConvolver);
      eventLoopConvolver.connect(eventLoopReverbWetGain);
      eventLoopReverbWetGain.connect(eventLoopOutputGain);

      eventLoopPostEffectsSourceGain.connect(eventLoopDelayNode);
      eventLoopDelayNode.connect(eventLoopDelayWetGain);
      eventLoopDelayWetGain.connect(eventLoopOutputGain);
      eventLoopDelayNode.connect(eventLoopDelayFeedback);
      eventLoopDelayFeedback.connect(eventLoopDelayNode);

      outputGain.connect(audioContext.destination);
      outputGain.connect(loopMediaDestination);
      eventLoopOutputGain.connect(audioContext.destination);
      loopPlaybackGain.connect(audioContext.destination);

      ensureStringVoiceAssets(audioContext);
      updateReverbBuffer();
      updateEffects();
    }
    if(audioContext.state === "suspended") await audioContext.resume();
    updateEffects();
    return audioContext;
  }

  function frequencyForZone(stringIndex, position){
    const midi = openMidiNotes[stringIndex] + position;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  function frequencyForMidi(midi){
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  function captureEventLoopSettings(){
    return {
      releaseMs,
      yExpressionEnabled,
      expressionDepth,
      xPitchExpressionEnabled,
      bendRangeCents,
      pluckModeEnabled,
      palmMuteModeEnabled,
      isEventLoopSnapshot: true,
      fx: {
        reverbEnabled,
        reverbAmount,
        reverbDecay,
        delayEnabled,
        delayAmount,
        delayDecay,
        delaySpeed,
        distortionEnabled,
        distortionAmount,
        distortionInputLevel,
        distortionOutputLevel,
        masterVolume
      }
    };
  }

  function getLiveVoiceSettings(){
    return {
      releaseMs,
      yExpressionEnabled,
      expressionDepth,
      xPitchExpressionEnabled,
      bendRangeCents,
      pluckModeEnabled,
      palmMuteModeEnabled,
      isEventLoopSnapshot: false
    };
  }

  function getResolvedVoiceSettings(settings){
    return settings || getLiveVoiceSettings();
  }

  function getVoiceInputTarget(settings){
    const voiceSettings = getResolvedVoiceSettings(settings);
    return voiceSettings.isEventLoopSnapshot ? eventLoopInputGain : inputGain;
  }

  function updateEventLoopEffects(){
    if(!audioContext || !eventLoopInputGain || !eventLoopDryGain || !eventLoopReverbWetGain || !eventLoopDelayWetGain || !eventLoopDelayNode || !eventLoopDelayFeedback || !eventLoopOutputGain || !eventLoopDistortionDryGain || !eventLoopDistortionPreGain || !eventLoopDistortionShaper || !eventLoopDistortionWetGainNode || !eventLoopSettingsSnapshot || !eventLoopSettingsSnapshot.fx) return;
    const fx = eventLoopSettingsSnapshot.fx;
    eventLoopDryGain.gain.value = 1;
    eventLoopReverbWetGain.gain.value = fx.reverbEnabled ? fx.reverbAmount : 0;
    eventLoopDelayWetGain.gain.value = fx.delayEnabled ? fx.delayAmount : 0;
    eventLoopDelayFeedback.gain.value = fx.delayEnabled ? fx.delayDecay : 0;
    eventLoopDelayNode.delayTime.value = fx.delaySpeed;

    eventLoopDistortionDryGain.gain.value = fx.distortionEnabled ? 0 : 1;
    eventLoopDistortionPreGain.gain.value = fx.distortionEnabled ? fx.distortionInputLevel : 0;
    eventLoopDistortionWetGainNode.gain.value = fx.distortionEnabled ? fx.distortionOutputLevel : 0;
    if(fx.distortionEnabled){
      if(eventLoopLastDistortionCurveAmount !== fx.distortionAmount){
        eventLoopDistortionShaper.curve = makeDistortionCurve(fx.distortionAmount);
        eventLoopLastDistortionCurveAmount = fx.distortionAmount;
      }
      eventLoopDistortionShaper.oversample = '4x';
    } else if(eventLoopLastDistortionCurveAmount !== null){
      eventLoopDistortionShaper.curve = null;
      eventLoopLastDistortionCurveAmount = null;
    }

    eventLoopOutputGain.gain.value = fx.masterVolume ?? masterVolume;
    if(eventLoopConvolver && fx.reverbEnabled){
      eventLoopConvolver.buffer = createImpulseResponse(audioContext, fx.reverbDecay);
    }
  }

  function eventLoopBeatDurationMs(){
    return (60 / eventLoopTempo) * 1000;
  }

  function clearEventLoopTimeouts(){
    eventLoopPlaybackTimeouts.forEach(id => clearTimeout(id));
    eventLoopPlaybackTimeouts = [];
    if(eventLoopCycleTimeout){
      clearTimeout(eventLoopCycleTimeout);
      eventLoopCycleTimeout = null;
    }
  }

  function applyEventLoopSettingsSnapshot(){
    return eventLoopSettingsSnapshot;
  }

  function updateEventLoopUi(){
    const hasLoop = eventLoopEvents.length > 0 && eventLoopDurationMs > 0;
    eventLoopBpmReadoutEl.textContent = `${Math.round(eventLoopTempo)} BPM`;
    eventLoopBeatsReadoutEl.textContent = String(eventLoopBeats);
    eventLoopCountInReadoutEl.textContent = String(eventLoopCountInBeats);
    eventLoopRecordBtn.classList.toggle("recording", eventLoopState === "count-in" || eventLoopState === "recording");
    eventLoopRecordBtn.classList.toggle("playing", false);
    eventLoopPlayBtn.classList.toggle("playing", eventLoopState === "playing");
    if(eventLoopState === "count-in") eventLoopRecordBtn.textContent = "Count-in…";
    else if(eventLoopState === "recording") eventLoopRecordBtn.textContent = "Recording…";
    else eventLoopRecordBtn.textContent = "Event Rec";

    eventLoopPlayBtn.disabled = !hasLoop || eventLoopState === "count-in" || eventLoopState === "recording" || eventLoopState === "playing";
    eventLoopStopBtn.disabled = eventLoopState === "idle";

    if(eventLoopState === "count-in") eventLoopStatusEl.textContent = `Count-in: ${eventLoopCountInBeats} beats`;
    else if(eventLoopState === "recording") eventLoopStatusEl.textContent = `Recording ${eventLoopBeats} beats @ ${Math.round(eventLoopTempo)} BPM`;
    else if(eventLoopState === "playing") eventLoopStatusEl.textContent = `Event loop playing · ${eventLoopBeats} beats`;
    else eventLoopStatusEl.textContent = hasLoop ? `Event loop ready · ${eventLoopBeats} beats @ ${Math.round(eventLoopTempo)} BPM` : "No event loop recorded";
  }

  async function playMetronomeClick(){
    if(!eventLoopMetronomeEnabled) return;
    const ctx = await ensureAudio();
    if(!eventLoopMetronomeGain){
      eventLoopMetronomeGain = ctx.createGain();
      eventLoopMetronomeGain.connect(outputGain);
    }
    eventLoopMetronomeGain.gain.value = eventLoopMetronomeVolume;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(1100, now);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.35, now + 0.002);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.045);
    osc.connect(gain);
    gain.connect(eventLoopMetronomeGain);
    osc.start(now);
    osc.stop(now + 0.05);
  }

  function recordEventLoopAction(type, pointerId, zone = null, yProfile = null, cents = 0, midi = null, forcedTime = null){
    if(eventLoopState !== "recording") return;
    const now = performance.now();
    const time = forcedTime === null ? Math.max(0, Math.round(now - eventLoopRecordStartMs)) : forcedTime;
    if(type === "on") {
      const voiceId = ++eventLoopVoiceIdCounter;
      eventLoopPointerMap.set(pointerId, voiceId);
      eventLoopEvents.push({ type: "on", time, voiceId, zone: zone ? { ...zone } : null, yProfile: yProfile ? copyProfile(yProfile) : copyProfile(DEFAULT_Y_PROFILE), cents, midi });
    } else if(type === "slide") {
      const voiceId = eventLoopPointerMap.get(pointerId);
      if(voiceId == null) return;
      eventLoopEvents.push({ type: "slide", time, voiceId, zone: zone ? { ...zone } : null, yProfile: yProfile ? copyProfile(yProfile) : copyProfile(DEFAULT_Y_PROFILE), cents, midi });
    } else if(type === "off") {
      const voiceId = eventLoopPointerMap.get(pointerId);
      if(voiceId == null) return;
      eventLoopEvents.push({ type: "off", time, voiceId });
      eventLoopPointerMap.delete(pointerId);
    }
  }

  function captureHeldNotesAtEventLoopStart(){
    if(eventLoopState !== "recording") return;
    activeTouches.forEach((voice, pointerId) => {
      if(String(pointerId).startsWith(eventLoopPlaybackPointerPrefix)) return;
      if(eventLoopPointerMap.has(pointerId)) return;
      const zoneKey = touchZones.get(pointerId) || voice.zoneKey;
      if(!zoneKey) return;
      const zone = zoneLookup.get(zoneKey);
      if(!zone) return;
      const midi = openMidiNotes[zone.stringIndex] + zone.position;
      recordEventLoopAction("on", pointerId, zone, voice.yProfile || DEFAULT_Y_PROFILE, voice.bendCents ?? 0, midi, 0);
    });
  }

  async function startEventLoopPlaybackCycle(){
    if(!eventLoopEvents.length || eventLoopDurationMs <= 0) return;
    await ensureAudio();
    const cycleDuration = eventLoopDurationMs;
    const scheduleCycle = () => {
      if(eventLoopState !== "playing") return;
      eventLoopEvents.forEach(evt => {
        const timeoutId = setTimeout(async () => {
          if(eventLoopState !== "playing") return;
          const pointerId = `${eventLoopPlaybackPointerPrefix}${evt.voiceId}`;
          if(evt.type === "on" && evt.zone){
            await startVoice(pointerId, evt.zone, copyProfile(evt.yProfile), evt.cents, evt.midi, eventLoopSettingsSnapshot);
          } else if(evt.type === "slide" && evt.zone){
            retuneVoice(pointerId, evt.zone, copyProfile(evt.yProfile), evt.cents, evt.midi, eventLoopSettingsSnapshot);
          } else if(evt.type === "off") {
            stopVoice(pointerId);
          }
        }, evt.time);
        eventLoopPlaybackTimeouts.push(timeoutId);
      });
      eventLoopCycleTimeout = setTimeout(scheduleCycle, cycleDuration);
    };
    scheduleCycle();
  }

  function stopEventLoopPlayback(clearLoop = false){
    clearEventLoopTimeouts();
    const activeIds = Array.from(activeTouches.keys()).filter(id => String(id).startsWith(eventLoopPlaybackPointerPrefix));
    activeIds.forEach(id => stopVoice(id));
    if(clearLoop){
      eventLoopEvents = [];
      eventLoopDurationMs = 0;
      eventLoopSettingsSnapshot = null;
      if(eventLoopOutputGain) eventLoopOutputGain.gain.value = 0;
    }
    if(eventLoopState === "playing") eventLoopState = "idle";
    updateEventLoopUi();
  }

  async function startEventLoopPlayback(){
    if(!eventLoopEvents.length || eventLoopDurationMs <= 0) return;
    stopEventLoopPlayback(false);
    eventLoopState = "playing";
    updateEventLoopUi();
    await startEventLoopPlaybackCycle();
  }

  async function beginEventLoopRecording(){
    await ensureAudio();
    stopEventLoopPlayback(true);
    panicStopAll();
    eventLoopVoiceIdCounter = 0;
    eventLoopPointerMap = new Map();
    eventLoopSettingsSnapshot = captureEventLoopSettings();
    updateEventLoopEffects();
    eventLoopDurationMs = Math.round(eventLoopBeats * eventLoopBeatDurationMs());
    const countIn = Math.max(0, eventLoopCountInBeats);
    eventLoopState = countIn > 0 ? "count-in" : "recording";
    updateEventLoopUi();

    const startRecording = () => {
      eventLoopEvents = [];
      eventLoopPointerMap = new Map();
      eventLoopState = "recording";
      eventLoopRecordStartMs = performance.now();
      captureHeldNotesAtEventLoopStart();
      updateEventLoopUi();

      const beatMs = eventLoopBeatDurationMs();
      if(eventLoopMetronomeEnabled){
        for(let i = 0; i < eventLoopBeats; i += 1){
          const clickId = setTimeout(() => { playMetronomeClick(); }, Math.round(i * beatMs));
          eventLoopPlaybackTimeouts.push(clickId);
        }
      }

      const finishId = setTimeout(() => {
        finishEventLoopRecording();
      }, eventLoopDurationMs);
      eventLoopPlaybackTimeouts.push(finishId);
    };

    if(countIn > 0){
      for(let i = 0; i < countIn; i += 1){
        const id = setTimeout(() => { playMetronomeClick(); }, Math.round(i * eventLoopBeatDurationMs()));
        eventLoopPlaybackTimeouts.push(id);
      }
      const startId = setTimeout(() => {
        startRecording();
      }, Math.round(countIn * eventLoopBeatDurationMs()));
      eventLoopPlaybackTimeouts.push(startId);
    } else {
      startRecording();
    }
  }

  function finishEventLoopRecording(){
    if(eventLoopState !== "recording") return;
    const heldPointers = Array.from(eventLoopPointerMap.keys());
    heldPointers.forEach(pointerId => recordEventLoopAction("off", pointerId));
    eventLoopState = "idle";
    updateEventLoopUi();
    if(eventLoopEvents.length) startEventLoopPlayback();
  }

  function clearLoopTimeouts(){
    if(loopPlaybackSource){
      try { loopPlaybackSource.stop(); } catch(e){}
      try { loopPlaybackSource.disconnect(); } catch(e){}
      loopPlaybackSource = null;
    }
  }

  function updateLoopUi(){
    const hasLoop = !!loopAudioBuffer;
    loopBtn.classList.toggle("recording", loopState === "recording");
    loopBtn.classList.toggle("playing", loopState === "playing");
    if(loopState === "recording") loopBtn.textContent = "Loop: Finish";
    else if(loopState === "playing") loopBtn.textContent = "Loop: Re-record";
    else loopBtn.textContent = hasLoop ? "Loop: Record New" : "Loop: Off";

    playLoopBtn.disabled = !hasLoop || loopState === "recording" || loopState === "playing";
    stopLoopBtn.disabled = loopState !== "playing";

    if(loopState === "recording") loopStatusEl.textContent = "Recording loop…";
    else if(loopState === "playing") loopStatusEl.textContent = `Looping ${Math.max(loopDurationMs / 1000, 0).toFixed(2)} s`;
    else loopStatusEl.textContent = hasLoop ? `Loop ready · ${Math.max(loopDurationMs / 1000, 0).toFixed(2)} s` : "No loop recorded";
  }

  function clearRecordedLoop(){
    clearLoopTimeouts();
    loopAudioBuffer = null;
    loopDurationMs = 0;
    if(loopBlobUrl){
      URL.revokeObjectURL(loopBlobUrl);
      loopBlobUrl = null;
    }
  }

  function stopLoopPlayback(clearRecordedLoopToo = false){
    clearLoopTimeouts();
    if(clearRecordedLoopToo){
      clearRecordedLoop();
    }
    if(loopState === "playing") loopState = "idle";
    updateLoopUi();
  }

  function startLoopPlayback(){
    if(!audioContext || !loopAudioBuffer) return;
    stopLoopPlayback(false);
    loopState = "playing";
    const source = audioContext.createBufferSource();
    source.buffer = loopAudioBuffer;
    source.loop = true;
    source.connect(loopPlaybackGain);
    source.onended = () => {
      if(loopPlaybackSource === source){
        loopPlaybackSource = null;
      }
    };
    source.start();
    loopPlaybackSource = source;
    updateLoopUi();
  }

  async function beginLoopRecording(){
    await ensureAudio();
    stopLoopPlayback(false);
    if(typeof MediaRecorder === "undefined" || !loopMediaDestination){
      loopStatusEl.textContent = "Loop capture unavailable";
      return;
    }
    loopState = "recording";
    loopDurationMs = 0;
    loopRecordStartMs = performance.now();
    loopChunks = [];

    if(loopMediaRecorder && loopMediaRecorder.state !== "inactive") {
      try { loopMediaRecorder.stop(); } catch(e){}
    }

    const mimeTypes = [
      "audio/webm;codecs=opus",
      "audio/webm",
      "audio/ogg;codecs=opus"
    ];
    const mimeType = mimeTypes.find(type => window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(type)) || "";
    loopMediaRecorder = new MediaRecorder(loopMediaDestination.stream, mimeType ? { mimeType } : undefined);
    loopMediaRecorder.ondataavailable = (event) => {
      if(event.data && event.data.size) loopChunks.push(event.data);
    };
    loopMediaRecorder.onstop = async () => {
      const thisToken = ++loopDecodeToken;
      const blob = new Blob(loopChunks, { type: loopMediaRecorder.mimeType || "audio/webm" });
      loopChunks = [];
      if(loopBlobUrl){
        URL.revokeObjectURL(loopBlobUrl);
      }
      loopBlobUrl = URL.createObjectURL(blob);
      try {
        const buffer = await blob.arrayBuffer();
        const decoded = await audioContext.decodeAudioData(buffer.slice(0));
        if(thisToken !== loopDecodeToken) return;
        loopAudioBuffer = decoded;
        loopDurationMs = decoded.duration * 1000;
        loopState = "idle";
        updateLoopUi();
        startLoopPlayback();
      } catch(err){
        loopAudioBuffer = null;
        loopDurationMs = 0;
        loopState = "idle";
        loopStatusEl.textContent = "Loop decode failed";
        updateLoopUi();
      }
    };
    loopMediaRecorder.start();
    updateLoopUi();
  }

  function finishLoopRecording(){
    if(loopState !== "recording" || !loopMediaRecorder) return;
    loopDurationMs = Math.max(1, Math.round(performance.now() - loopRecordStartMs));
    try { loopMediaRecorder.stop(); } catch(err) {
      loopState = "idle";
      updateLoopUi();
    }
  }

  function stopVoice(pointerId){
    if(eventLoopState === "recording" && !String(pointerId).startsWith(eventLoopPlaybackPointerPrefix)){
      recordEventLoopAction("off", pointerId);
    }
    const voice = activeTouches.get(pointerId);
    if(!voice || !audioContext) return;
    const now = audioContext.currentTime;
    voice.voiceGain.gain.cancelScheduledValues(now);
    voice.voiceGain.gain.setValueAtTime(Math.max(voice.voiceGain.gain.value, 0.0001), now);
    const voiceSettings = voice.settings || getLiveVoiceSettings();
    const stopRamp = voiceSettings.pluckModeEnabled ? 0.005 : Math.max(0.001, voiceSettings.releaseMs / 1000);
    voice.voiceGain.gain.exponentialRampToValueAtTime(0.0001, now + stopRamp);
    [voice.osc, voice.transientOsc, voice.noiseSource, voice.bowNoiseSource].forEach(src => {
      if(!src) return;
      try { src.stop(now + stopRamp + 0.04); } catch(e){}
    });
    activeTouches.delete(pointerId);
  }

  function panicStopAll(){
    clearLoopTimeouts();
    const ids = Array.from(activeTouches.keys());
    ids.forEach(id => stopVoice(id));
    touchZones.clear();
    if(loopState === "playing") loopState = "idle";
    updatePressedVisuals();
    updateLoopUi();
  }

  function retuneVoice(pointerId, zone, yProfile = null, cents = 0, midiOverride = null, settings = null){
    const voice = activeTouches.get(pointerId);
    if(!voice || !audioContext) return;
    const midi = midiOverride ?? (openMidiNotes[zone.stringIndex] + zone.position);
    if(eventLoopState === "recording" && !String(pointerId).startsWith(eventLoopPlaybackPointerPrefix)){
      recordEventLoopAction("slide", pointerId, zone, yProfile, cents, midi);
    }
    const normalizedProfile = clampProfile(yProfile);
    if(settings && voice){
      voice.settings = { ...getResolvedVoiceSettings(settings) };
    }
    const baseFrequency = frequencyForMidi(midi);
    const targetFrequency = baseFrequency * centsToRatio(cents);
    const now = audioContext.currentTime;

    voice.baseFrequency = baseFrequency;
    voice.zoneKey = zone.key;
    if(voice.osc){
      voice.osc.frequency.cancelScheduledValues(now);
      voice.osc.frequency.linearRampToValueAtTime(targetFrequency, now + 0.01);
    }
    voice.bendCents = cents;

    if(!(voice.settings?.pluckModeEnabled ?? pluckModeEnabled)){
      applyExpressionToVoice(voice, normalizedProfile, null);
    } else {
      applyBodyProfile(voice, voice.yProfile || normalizedProfile, false);
    }

  }

  async function startVoice(pointerId, zone, yProfile = null, cents = 0, midiOverride = null, settings = null){
    if(!audioEnabled) return;
    const ctx = await ensureAudio();
    stopVoice(pointerId);

    const osc = ctx.createOscillator();
    const bodyFilter = ctx.createBiquadFilter();
    const smoothFilter = ctx.createBiquadFilter();
    const voiceGain = ctx.createGain();

    const normalizedProfile = clampProfile(yProfile);
    const voiceSettings = getResolvedVoiceSettings(settings);
    const targetGain = gainFromLevel(normalizedProfile.level) * gainMultiplierFromProfile(normalizedProfile, voiceSettings);
    const midi = midiOverride ?? (openMidiNotes[zone.stringIndex] + zone.position);
    if(eventLoopState === "recording" && !String(pointerId).startsWith(eventLoopPlaybackPointerPrefix)){
      recordEventLoopAction("on", pointerId, zone, normalizedProfile, cents, midi);
    }
    const baseFrequency = frequencyForMidi(midi);
    const currentFrequency = baseFrequency * centsToRatio(cents);
    const body = bodyToneFromProfile(normalizedProfile, baseFrequency, voiceSettings);

    osc.setPeriodicWave(getStringWaveForMuteMix(ctx, normalizedProfile.muteMix ?? 0));
    osc.frequency.value = currentFrequency;

    bodyFilter.type = "peaking";
    bodyFilter.frequency.value = body.bodyCenter;
    bodyFilter.Q.value = body.bodyQ;
    bodyFilter.gain.value = body.bodyGain;

    smoothFilter.type = "lowpass";
    smoothFilter.frequency.value = body.smoothCutoff;
    smoothFilter.Q.value = 0.2;

    voiceGain.gain.value = Math.max(0.0001, targetGain);

    osc.connect(bodyFilter);
    bodyFilter.connect(smoothFilter);
    smoothFilter.connect(voiceGain);
    voiceGain.connect(getVoiceInputTarget(voiceSettings));

    const now = ctx.currentTime;
    if(voiceSettings.pluckModeEnabled){
      voiceGain.gain.setValueAtTime(Math.max(0.0001, targetGain), now);
      voiceGain.gain.linearRampToValueAtTime(Math.max(0.0001, targetGain), now + 0.001);
    } else {
      voiceGain.gain.setValueAtTime(0.0001, now);
    }
    osc.start(now);

    const voice = {
      osc,
      bodyFilter,
      smoothFilter,
      voiceGain,
      gain: voiceGain,
      filter: smoothFilter,
      zoneKey: zone.key,
      expressionLevel: normalizedProfile.level,
      baseFrequency,
      bendCents: cents,
      pluckLevel: normalizedProfile.level,
      yProfile: copyProfile(normalizedProfile),
      settings: { ...voiceSettings },
      lastTargetGain: targetGain,
      lastMuteMix: normalizedProfile.muteMix ?? 0,
      lastBodyCenter: body.bodyCenter,
      lastBodyQ: body.bodyQ,
      lastBodyGain: body.bodyGain,
      lastSmoothCutoff: body.smoothCutoff
    };
    activeTouches.set(pointerId, voice);

    applyBodyProfile(voice, normalizedProfile, true);

    if(voiceSettings.pluckModeEnabled){
      schedulePluckTransient(voice, normalizedProfile);
      schedulePluckDecay(voice, normalizedProfile);
    } else {
      startBowSustain(voice, normalizedProfile);
    }

  }

  function updatePressedVisuals(){
    const activeKeys = new Set(Array.from(touchZones.values()));
    zoneElementLookup.forEach((el, key) => {

  function zoneFromPoint(clientX, clientY){
    const stack = document.elementsFromPoint ? document.elementsFromPoint(clientX, clientY) : [document.elementFromPoint(clientX, clientY)];
    for(const el of stack){
      const zoneEl = el && el.closest ? el.closest("[data-zone-key]") : null;
      if(zoneEl) return zoneLookup.get(zoneEl.dataset.zoneKey);
    }
    return null;
  }

    await startVoice(e.pointerId, zone, copyProfile(yExpression), xExpression.cents);

  async function handlePointerMove(e){
    if(!touchZones.has(e.pointerId)) return;
    const hit = zoneFromPoint(e.clientX, e.clientY);
    const currentKey = touchZones.get(e.pointerId);

    if(!hit){
      touchZones.delete(e.pointerId);
      updatePressedVisuals();
      stopVoice(e.pointerId);
      return;
    }

    const hitEl = zoneElementLookup.get(hit.key);
    const yExpression = getYExpressionFromEvent(e, hitEl);
    const xExpression = getXExpressionFromEvent(e, hitEl);

    if(hit.key !== currentKey){
      touchZones.set(e.pointerId, hit.key);
      updatePressedVisuals();
      const currentZone = zoneLookup.get(currentKey);
      if(!pluckModeEnabled && activeTouches.has(e.pointerId)){
        retuneVoice(e.pointerId, hit, copyProfile(yExpression), xExpression.cents);
      } else if(pluckModeEnabled && currentZone && currentZone.stringIndex === hit.stringIndex && activeTouches.has(e.pointerId)){
        const lockedProfile = activeTouches.get(e.pointerId)?.yProfile || yExpression;
        retuneVoice(e.pointerId, hit, lockedProfile, xExpression.cents);
      } else {
        await startVoice(e.pointerId, hit, copyProfile(yExpression), xExpression.cents);
      }
      return;
    }

    const voice = activeTouches.get(e.pointerId);
    if(voice){
      const nextProfile = pluckModeEnabled ? (voice.yProfile || DEFAULT_Y_PROFILE) : yExpression;
      applyExpressionToVoice(voice, nextProfile, xExpression.cents);
      const midi = openMidiNotes[hit.stringIndex] + hit.position;
      recordEventLoopAction("slide", e.pointerId, hit, copyProfile(nextProfile), xExpression.cents, midi);
    }
  }

      finishLoopRecording();
    } else {
      await beginLoopRecording();
    }
  });

  playLoopBtn.addEventListener("click", () => {
    if(loopAudioBuffer && loopDurationMs > 0){
      startLoopPlayback();
    }
  });

  stopLoopBtn.addEventListener("click", () => {
    stopLoopPlayback(false);
  });

  eventLoopTempoDownBtn.addEventListener("click", () => {
    eventLoopTempo = clamp(Math.round(eventLoopTempo) - 1, 30, 300);
    updateEventLoopUi();
  });

  eventLoopTempoUpBtn.addEventListener("click", () => {
    eventLoopTempo = clamp(Math.round(eventLoopTempo) + 1, 30, 300);
    updateEventLoopUi();
  });

  eventLoopTapTempoBtn.addEventListener("click", () => {
    const now = performance.now();
    if(eventLoopTapTimes.length && now - eventLoopTapTimes[eventLoopTapTimes.length - 1] > 2000){
      eventLoopTapTimes = [];
    }
    eventLoopTapTimes.push(now);
    if(eventLoopTapTimes.length > 5) eventLoopTapTimes.shift();
    if(eventLoopTapTimes.length >= 2){
      const intervals = [];
      for(let i = 1; i < eventLoopTapTimes.length; i += 1) intervals.push(eventLoopTapTimes[i] - eventLoopTapTimes[i - 1]);
      const avg = intervals.reduce((acc, value) => acc + value, 0) / intervals.length;
      if(avg > 0){
        eventLoopTempo = clamp(Math.round(60000 / avg), 30, 300);
        updateEventLoopUi();
      }
    }
  });

  eventLoopBeatsDownBtn.addEventListener("click", () => {
    eventLoopBeats = clamp(eventLoopBeats - 1, 1, 64);
    updateEventLoopUi();
  });

  eventLoopBeatsUpBtn.addEventListener("click", () => {
    eventLoopBeats = clamp(eventLoopBeats + 1, 1, 64);
    updateEventLoopUi();
  });

  eventLoopCountInDownBtn.addEventListener("click", () => {
    eventLoopCountInBeats = clamp(eventLoopCountInBeats - 1, 0, 16);
    updateEventLoopUi();
  });

  eventLoopCountInUpBtn.addEventListener("click", () => {
    eventLoopCountInBeats = clamp(eventLoopCountInBeats + 1, 0, 16);
    updateEventLoopUi();
  });

  eventLoopMetronomeEl.addEventListener("change", () => {
    eventLoopMetronomeEnabled = eventLoopMetronomeEl.checked;
  });
  eventLoopMetronomeVolumeEl.addEventListener("input", () => {
    eventLoopMetronomeVolume = parseFloat(eventLoopMetronomeVolumeEl.value) || 0;
    eventLoopMetronomeVolumeValueEl.textContent = eventLoopMetronomeVolume.toFixed(2);
    if(eventLoopMetronomeGain) eventLoopMetronomeGain.gain.value = eventLoopMetronomeVolume;
  });

  eventLoopRecordBtn.addEventListener("click", async () => {
    if(eventLoopState === "count-in" || eventLoopState === "recording") return;
    await beginEventLoopRecording();
  });

  eventLoopPlayBtn.addEventListener("click", async () => {
    await startEventLoopPlayback();
  });

  eventLoopStopBtn.addEventListener("click", () => {
    if(eventLoopState === "count-in" || eventLoopState === "recording"){
      clearEventLoopTimeouts();
      eventLoopState = "idle";
      updateEventLoopUi();
      return;
    }
    stopEventLoopPlayback(false);
  });

  addLeftStringBtn.addEventListener("click", () => {
    if(leftBoundary > 0 && leftBoundary !== -1 && rightBoundary !== -1){
      currentPreset = "custom";
      leftBoundary -= 1;
      openMidiNotes = FULL_STRING_SET.slice(leftBoundary, rightBoundary + 1);
      atoms = [createDefaultAtom(openPitchClassAt(0)), ...atoms];
      panicStopAll();
      renderAll();
    }
  });

  addRightStringBtn.addEventListener("click", () => {
    if(rightBoundary < FULL_STRING_SET.length - 1 && leftBoundary !== -1 && rightBoundary !== -1){
      currentPreset = "custom";
      rightBoundary += 1;
      openMidiNotes = FULL_STRING_SET.slice(leftBoundary, rightBoundary + 1);
      atoms = [...atoms, createDefaultAtom(openPitchClassAt(openMidiNotes.length - 1))];
      panicStopAll();
      renderAll();
    }
  });

  removeLeftStringBtn.addEventListener("click", () => {
    if(leftBoundary < CENTER_INDEX && leftBoundary !== -1 && rightBoundary !== -1){
      currentPreset = "custom";
      leftBoundary += 1;
      openMidiNotes = FULL_STRING_SET.slice(leftBoundary, rightBoundary + 1);
      atoms = atoms.slice(1);
      panicStopAll();
      renderAll();
    }
  });

  removeRightStringBtn.addEventListener("click", () => {
    if(rightBoundary > CENTER_INDEX && leftBoundary !== -1 && rightBoundary !== -1){
      currentPreset = "custom";
      rightBoundary -= 1;
      openMidiNotes = FULL_STRING_SET.slice(leftBoundary, rightBoundary + 1);
      atoms = atoms.slice(0, -1);
      panicStopAll();
      renderAll();
    }
  });

  function renderAll(){
    if(atoms.length !== openMidiNotes.length){
      if(atoms.length < openMidiNotes.length){
        while(atoms.length < openMidiNotes.length){
          atoms.push(createDefaultAtom(openPitchClassAt(atoms.length)));
        }
      } else {
        atoms = atoms.slice(0, openMidiNotes.length);
      }
    }

    const boardTuningMetaEl = document.getElementById("boardTuningMeta");
    if(boardTuningMetaEl){
      boardTuningMetaEl.textContent = `Flat board · ${openMidiNotes.length} strings · 25 positions`;
    }

    const contiguousCustomRange = leftBoundary !== -1 && rightBoundary !== -1;
    addLeftStringBtn.disabled = !contiguousCustomRange || leftBoundary <= 0;
    addRightStringBtn.disabled = !contiguousCustomRange || rightBoundary >= FULL_STRING_SET.length - 1;
    removeLeftStringBtn.disabled = !contiguousCustomRange || leftBoundary >= CENTER_INDEX;
    removeRightStringBtn.disabled = !contiguousCustomRange || rightBoundary <= CENTER_INDEX;

    syncPresetSelect();
    renderAtoms();
    renderBoard();
  }

  applyPreset(DEFAULT_PRESET);
})();
</script>
</body>
</html>
